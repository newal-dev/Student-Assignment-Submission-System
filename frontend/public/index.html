<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 600px;
            background: white;
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.25rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        h1 {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.75rem 2rem;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-2px);
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
            text-align: left;
        }
        
        .feature {
            padding: 1rem;
            background: #f7fafc;
            border-radius: 0.375rem;
            border-left: 3px solid #667eea;
        }
        
        .feature h3 {
            font-size: 0.9rem;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }
        
        .feature p {
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 0;
        }
        
        .logged-in-info {
            background: #f0fff4;
            border: 1px solid #48bb78;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1.5rem;
        }
        
        .logged-in-info p {
            margin: 0;
            color: #276749;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">AS</div>
        <h1>Assignment System</h1>
        <p class="subtitle">Streamline your assignment management. Teachers create and grade, students submit and track.</p>
        
        <div id="logged-in-info" style="display: none;"></div>
        
        <div class="buttons" id="action-buttons">
            <a href="/login.html" class="btn btn-primary">Login</a>
            <a href="/register.html" class="btn btn-secondary">Get Started</a>
        </div>
        
        
    </div>

    <script>
        // Check if user is already logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        
        if (token && user) {
            const infoDiv = document.getElementById('logged-in-info');
            const buttonsDiv = document.getElementById('action-buttons');
            
            infoDiv.style.display = 'block';
            infoDiv.innerHTML = `
                <p>Welcome back, <strong>${user.username}</strong>!</p>
                <p style="font-size: 0.9rem; margin-top: 0.25rem;">


                </p>
            `;
            
            buttonsDiv.innerHTML = `
                <a href="/${user.role}-dashboard.html" class="btn btn-primary">Go to Dashboard</a>
                <a href="#" onclick="logoutUser(event)" class="btn btn-secondary">Logout</a>
            `;
        }
        
        function logoutUser(e) {
            e.preventDefault();
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.reload();
            }
        }
    </script>
</body>
</html>
