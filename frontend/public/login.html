<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assignment System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }
        
        .auth-card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }
        
        .auth-header p {
            color: #718096;
            font-size: 0.95rem;
        }
        
        .auth-logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.375rem;
            color: #2d3748;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input.error {
            border-color: #fc8181;
        }
        
        .error-message {
            color: #fc8181;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .auth-button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .auth-button:hover {
            background: #5a67d8;
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #718096;
            font-size: 0.9rem;
        }
        
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #a0aec0;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .auth-divider span {
            padding: 0 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">📚</div>
                <h1>Welcome Back</h1>
                <p>Login to access your assignments</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required autofocus>
                    <div class="error-message" id="email-error">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <div class="error-message" id="password-error">Password is required</div>
                </div>

                <div id="general-error" class="error-message" style="margin-bottom: 1rem;"></div>

                <button type="submit" class="auth-button" id="login-btn">
                    Sign In
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="/register.html">Create one now</a>
            </div>

            <div class="auth-footer" style="margin-top: 0.5rem; font-size: 0.8rem; color: #a0aec0;">
                <p>Demo Accounts:</p>
                <p>Teacher: teacher@school.com / password123</p>
                <p>Student: student@school.com / password123</p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        // Login form handling
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('login-btn');
            const generalError = document.getElementById('general-error');
            
            // Reset errors
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.form-group input').forEach(el => el.classList.remove('error'));
            generalError.textContent = '';
            
            // Validate
            let isValid = true;
            
            if (!email) {
                document.getElementById('email-error').textContent = 'Email is required';
                document.getElementById('email-error').classList.add('show');
                document.getElementById('email').classList.add('error');
                isValid = false;
            } else if (!email.includes('@')) {
                document.getElementById('email-error').textContent = 'Please enter a valid email';
                document.getElementById('email-error').classList.add('show');
                document.getElementById('email').classList.add('error');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('password-error').textContent = 'Password is required';
                document.getElementById('password-error').classList.add('show');
                document.getElementById('password').classList.add('error');
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Submit
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                const data = await api.login(email, password);
                
                // Show success
                showToast('Login successful! Redirecting...', 'success');
                
                // Redirect based on role
                setTimeout(() => {
                    if (data.user.role === 'teacher') {
                        window.location.href = '/teacher-dashboard.html';
                    } else {
                        window.location.href = '/student-dashboard.html';
                    }
                }, 500);
                
            } catch (error) {
                generalError.textContent = error.message || 'Login failed. Please try again.';
                generalError.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        // Real-time validation
        document.getElementById('email').addEventListener('input', (e) => {
            const error = document.getElementById('email-error');
            if (e.target.value && e.target.value.includes('@')) {
                error.classList.remove('show');
                e.target.classList.remove('error');
            }
        });

        document.getElementById('password').addEventListener('input', (e) => {
            const error = document.getElementById('password-error');
            if (e.target.value.length >= 6) {
                error.classList.remove('show');
                e.target.classList.remove('error');
            }
        });
    </script>
</body>
</html>
