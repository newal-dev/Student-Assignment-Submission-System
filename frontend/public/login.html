<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assignment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .auth-card {
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }
        
        .auth-header p {
            color: #718096;
            font-size: 0.95rem;
        }
        
        .auth-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 0.75rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.375rem;
            color: #2d3748;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input.error {
            border-color: #fc8181;
        }
        
        .error-message {
            color: #fc8181;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .auth-button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        
        .auth-button:hover:not(:disabled) {
            background: #5a67d8;
        }

        .auth-button:active:not(:disabled) {
            transform: scale(0.99);
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #718096;
            font-size: 0.9rem;
        }
        
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .demo-accounts {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f7fafc;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            color: #4a5568;
        }
        
        .demo-accounts p {
            margin: 0.25rem 0;
        }
        
        .demo-accounts strong {
            color: #2d3748;
        }
        
        #general-error {
            background: #fff5f5;
            border: 1px solid #fc8181;
            padding: 0.75rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            display: none;
            color: #c53030;
        }
        
        #general-error.show {
            display: block;
        }
        
        .success-message {
            background: #f0fff4;
            border: 1px solid #48bb78;
            padding: 0.75rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            display: none;
            color: #276749;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">AS</div>
            <h1>Welcome Back</h1>
            <p>Login to access your assignments</p>
        </div>

        <div id="success-message" class="success-message"></div>
        <div id="general-error" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <div class="error-message" id="email-error">Please enter a valid email</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <div class="error-message" id="password-error">Password is required</div>
            </div>

            <button type="submit" class="auth-button" id="login-btn">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register.html">Create one now</a>
        </div>

        <div class="demo-accounts">
            <p><strong>Demo Accounts:</strong></p>
            <p>Teacher: <strong>teacher@school.com</strong> / password123</p>
            <p>Student: <strong>student@school.com</strong> / password123</p>
        </div>
    </div>

    <script>
        // Login page logic
        const API_BASE_URL = 'http://localhost:5000/api';

        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('login-btn');
        const generalError = document.getElementById('general-error');
        const successMessage = document.getElementById('success-message');
        const emailError = document.getElementById('email-error');
        const passwordError = document.getElementById('password-error');

        // Real-time validation
        emailInput.addEventListener('input', function() {
            if (this.value && this.value.includes('@')) {
                emailError.classList.remove('show');
                this.classList.remove('error');
            }
        });

        passwordInput.addEventListener('input', function() {
            if (this.value.length >= 6) {
                passwordError.classList.remove('show');
                this.classList.remove('error');
            }
        });

        // Form submit handler
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            generalError.classList.remove('show');
            generalError.textContent = '';
            successMessage.classList.remove('show');
            successMessage.textContent = '';
            
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            let isValid = true;
            
            if (!email || !email.includes('@')) {
                emailError.textContent = 'Please enter a valid email address';
                emailError.classList.add('show');
                emailInput.classList.add('error');
                isValid = false;
            }
            
            if (!password || password.length < 6) {
                passwordError.textContent = 'Password must be at least 6 characters';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                isValid = false;
            }
            
            if (!isValid) {
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || data.error || 'Login failed');
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                successMessage.textContent = 'Login successful! Redirecting...';
                successMessage.classList.add('show');
                
                setTimeout(() => {
                    if (data.user.role === 'teacher') {
                        window.location.href = '/teacher-dashboard.html';
                    } else {
                        window.location.href = '/student-dashboard.html';
                    }
                }, 800);
                
            } catch (error) {
                generalError.textContent = error.message || 'Login failed. Please try again.';
                generalError.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });

        // Redirect if already logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        
        if (token && user) {
            setTimeout(() => {
                if (user.role === 'teacher') {
                    window.location.href = '/teacher-dashboard.html';
                } else {
                    window.location.href = '/student-dashboard.html';
                }
            }, 500);
        }
    </script>
</body>
</html>
